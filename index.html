<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>אזרחות — משחק תרגול כיתה יא׳</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --blue-deep: #003F87;
    --blue-mid: #1565C0;
    --blue-light: #4B9CD3;
    --blue-pale: #E3F2FD;
    --white: #FFFFFF;
    --gold: #FFD700;
    --gold-dark: #F9A825;
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --red: #C62828;
    --red-light: #FFEBEE;
    --gray: #607D8B;
    --gray-light: #ECEFF1;
    --text: #1A237E;
    --shadow: 0 4px 20px rgba(0,63,135,0.18);
    --radius: 16px;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(160deg, #003F87 0%, #1565C0 40%, #4B9CD3 100%);
    min-height: 100vh;
    color: var(--text);
    direction: rtl;
  }

  #app {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .app-header {
    text-align: center;
    padding: 20px 0 12px;
    color: white;
  }
  .flag-stripe {
    height: 8px;
    background: linear-gradient(90deg, var(--blue-deep), var(--blue-light), var(--blue-deep));
    border-radius: 4px;
    margin-bottom: 10px;
    opacity: 0.6;
  }
  .app-header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .app-header .subtitle {
    font-size: 0.9rem;
    opacity: 0.85;
    margin-top: 4px;
  }
  .star-of-david {
    font-size: 1.4rem;
    margin: 0 6px;
  }

  /* ===== CARDS ===== */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== CHAPTER LIST ===== */
  .chapter-item {
    background: white;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    cursor: pointer;
    border-right: 5px solid var(--blue-deep);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  .chapter-item:active { transform: scale(0.98); }
  .chapter-item.locked {
    border-right-color: var(--gray);
    opacity: 0.55;
    cursor: not-allowed;
  }
  .chapter-item.completed { border-right-color: var(--green); }

  .chapter-info { flex: 1; }
  .chapter-num {
    font-size: 0.72rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chapter-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.3;
  }
  .chapter-stars {
    display: flex;
    gap: 3px;
    margin-top: 6px;
  }
  .chapter-stars span {
    font-size: 0.8rem;
    background: var(--blue-pale);
    border-radius: 10px;
    padding: 2px 7px;
    color: var(--blue-mid);
    font-weight: 600;
  }

  .chapter-icon {
    font-size: 1.6rem;
    margin-left: 12px;
    flex-shrink: 0;
  }
  .lock-icon {
    font-size: 1.3rem;
    margin-left: 10px;
    color: var(--gray);
  }

  /* ===== LEVEL SELECT ===== */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: white;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-bottom: 14px;
    transition: background 0.2s;
  }
  .back-btn:active { background: rgba(255,255,255,0.35); }

  .level-card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .level-card:active { transform: scale(0.97); }
  .level-card.locked-level {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .level-easy { border-right: 5px solid #43A047; }
  .level-medium { border-right: 5px solid #FB8C00; }
  .level-hard { border-right: 5px solid #E53935; }

  .level-info { flex: 1; }
  .level-name { font-size: 1.1rem; font-weight: 800; }
  .level-desc { font-size: 0.8rem; color: var(--gray); margin-top: 3px; }
  .level-stars-row { display: flex; gap: 3px; margin-top: 5px; }
  .star-filled { color: var(--gold-dark); font-size: 1.2rem; }
  .star-empty { color: #CFD8DC; font-size: 1.2rem; }
  .level-badge {
    font-size: 1.8rem;
    margin-left: 14px;
  }
  .level-count {
    font-size: 0.78rem;
    color: var(--gray);
    background: var(--gray-light);
    border-radius: 10px;
    padding: 3px 9px;
    margin-top: 4px;
    display: inline-block;
  }

  /* ===== QUESTION SCREEN ===== */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    height: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: white;
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    margin-bottom: 12px;
    font-size: 0.85rem;
    opacity: 0.9;
  }

  .question-card {
    background: white;
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    animation: fadeIn 0.3s ease;
  }

  .question-type-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 12px;
    letter-spacing: 0.3px;
  }
  .badge-mc { background: var(--blue-pale); color: var(--blue-mid); }
  .badge-tf { background: #FFF3E0; color: #E65100; }

  .question-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .options-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--gray-light);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 0.95rem;
    font-family: inherit;
    text-align: right;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    line-height: 1.4;
    direction: rtl;
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn:hover { background: var(--blue-pale); border-color: var(--blue-light); }
  .option-btn.selected-correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
    font-weight: 700;
  }
  .option-btn.selected-wrong {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
    font-weight: 700;
  }
  .option-btn.reveal-correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
    font-weight: 700;
  }
  .option-btn:disabled { cursor: not-allowed; }

  .tf-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .tf-btn {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: 2px solid transparent;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tf-true { background: var(--blue-pale); color: var(--blue-mid); }
  .tf-false { background: #FFF3E0; color: #E65100; }
  .tf-btn:active { transform: scale(0.97); }
  .tf-btn.selected-correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .tf-btn.selected-wrong {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }
  .tf-btn.reveal-correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .tf-btn:disabled { cursor: not-allowed; }

  /* ===== EXPLANATION ===== */
  .explanation-box {
    border-radius: 12px;
    padding: 16px;
    margin-top: 14px;
    animation: fadeIn 0.3s ease;
  }
  .explanation-box.correct-box {
    background: var(--green-light);
    border-right: 4px solid var(--green);
  }
  .explanation-box.wrong-box {
    background: var(--red-light);
    border-right: 4px solid var(--red);
  }
  .explanation-result {
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .correct-box .explanation-result { color: var(--green); }
  .wrong-box .explanation-result { color: var(--red); }

  .explanation-quote {
    font-size: 0.88rem;
    color: #333;
    line-height: 1.6;
    font-style: italic;
    border-right: 3px solid #90A4AE;
    padding-right: 10px;
    margin-top: 8px;
  }
  .explanation-label {
    font-size: 0.72rem;
    color: var(--gray);
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }

  .next-btn {
    width: 100%;
    padding: 15px;
    background: var(--blue-deep);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 14px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .next-btn:active { transform: scale(0.98); background: var(--blue-mid); }

  /* ===== CHAPTER END ===== */
  .end-card {
    background: white;
    border-radius: var(--radius);
    padding: 30px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease;
  }
  .end-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .end-sub { font-size: 0.9rem; color: var(--gray); margin-top: 6px; }
  .stars-display {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
    font-size: 2.8rem;
  }
  .star-anim {
    animation: starPop 0.4s ease;
  }
  @keyframes starPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
  }
  .score-text {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .score-sub {
    font-size: 0.85rem;
    color: var(--gray);
  }

  .retry-info {
    background: #FFF3E0;
    border-radius: 10px;
    padding: 12px 16px;
    margin: 16px 0;
    font-size: 0.88rem;
    color: #E65100;
    font-weight: 600;
  }

  .end-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .end-btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-deep); color: white; }
  .btn-secondary {
    background: var(--gray-light);
    color: var(--text);
    margin-top: 8px;
  }
  .btn-retry { background: #E65100; color: white; }

  /* ===== PROGRESS SECTION ===== */
  .menu-progress {
    background: rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 14px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .menu-progress .prog-label { font-size: 0.8rem; opacity: 0.8; }
  .menu-progress .prog-val { font-size: 1.3rem; font-weight: 800; }

  /* ===== RETRY BADGE ===== */
  .retry-banner {
    background: #FF6F00;
    color: white;
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 12px;
    font-size: 0.88rem;
    font-weight: 700;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 2px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ================================================================
// DATA — ALL QUESTIONS
// ================================================================
const CHAPTERS = [
  {
    id: 0,
    title: "הרקע ההיסטורי להכרזת העצמאות",
    icon: "📜",
    levels: {
      easy: [
        { type:"mc", q:"למי נשלחה הצהרת בלפור ב-1917?", opts:["לד\"ר חיים וייצמן","ללורד רוטשילד היהודי","לדוד בן גוריון","לנשיא ארה\"ב"], ans:1, ex:"מכתב ששלח שר החוץ הבריטי בלפור (ב-1917) ללורד היהודי רוטשילד." },
        { type:"tf", q:"הצהרת בלפור נשלחה בשנת 1917.", ans:true, ex:"מכתב ששלח שר החוץ הבריטי בלפור (ב-1917) ללורד היהודי רוטשילד." },
        { type:"mc", q:"מי נתן לבריטניה את כתב המנדט?", opts:["עצרת האו\"ם","ממשלת צרפת","חבר הלאומים","ממשלת ארה\"ב"], ans:2, ex:"הסמכה לבריטניה על ידי חבר הלאומים (ב-1922)." },
        { type:"tf", q:"החלטה 181 של האו\"ם התקבלה ב-29 בנובמבר 1947.", ans:true, ex:"החלטת עצרת האו\"ם בכ\"ט בנובמבר 1947 (29.11.47)." },
        { type:"mc", q:"מה קרה לאחר שהערבים דחו את החלטה 181?", opts:["חידשו משא ומתן","פנו לאו\"ם","החלו בפעולות איבה ומלחמה","חתמו על שביתת נשק"], ans:2, ex:"ההנהגה הערבית דחתה אותה והערבים החלו בפעולות איבה/מלחמה (השלב הראשון של מלחמת העצמאות)." },
        { type:"tf", q:"ההנהגה היהודית קיבלה את תוכנית החלוקה (החלטה 181).", ans:true, ex:"ההנהגה היהודית קיבלה את התכנית." }
      ],
      medium: [
        { type:"mc", q:"מה ציין כתב המנדט לגבי זכויות לא-יהודים בארץ ישראל?", opts:["התעלם מהם לחלוטין","הציע להם מדינה נפרדת","הדגיש את הצורך לשמור על זכויותיהם האזרחיות והדתיות","ביקש מהם לעזוב"], ans:2, ex:"המנדט מדגיש את הצורך לשמור את הזכויות האזרחיות והדתיות של לא-יהודים בארץ ישראל." },
        { type:"tf", q:"כתב המנדט ניתן על ארץ ישראל המערבית בלבד.", ans:false, ex:"המנדט ניתן על ארץ ישראל משני עברי הירדן (בריטניה הוציאה את עבר הירדן המזרחי מחוץ למנדט ובכך הניחה תשתית לממלכת ירדן)." },
        { type:"mc", q:"מה קבעה החלטה 181 של עצרת האו\"ם?", opts:["המשך שלטון בריטי","הקמת מדינה יהודית ומדינה ערבית","הקמת מדינה יהודית בלבד","חלוקה לשלוש מדינות"], ans:1, ex:"החלטה להקים בתוך החלק שנותר מן המנדט בארץ ישראל המערבית, מדינה יהודית ומדינה ערבית." },
        { type:"tf", q:"בריטניה הוציאה את עבר הירדן המזרחי מחוץ למנדט.", ans:true, ex:"בריטניה הוציאה את עבר הירדן המזרחי מחוץ למנדט ובכך הניחה תשתית לממלכת ירדן." },
        { type:"mc", q:"מה הצהרת בלפור מודיעה לגבי ארץ ישראל?", opts:["שארץ ישראל שייכת לבריטניה","על החלטת ממשלת בריטניה לקדם הקמת בית לאומי לעם היהודי בארץ ישראל","שארץ ישראל תחולק שווה בשווה","על מינוי נציב בריטי לארץ ישראל"], ans:1, ex:"מודיע על החלטת ממשלת בריטניה לקדם הקמת בית לאומי לעם היהודי בארץ ישראל." },
        { type:"tf", q:"כתב המנדט ניתן בשנת 1917.", ans:false, ex:"הסמכה לבריטניה על ידי חבר הלאומים (ב-1922)." }
      ],
      hard: [
        { type:"mc", q:"מה הקשר בין הצהרת בלפור לבין כתב המנדט?", opts:["כתב המנדט ביטל את הצהרת בלפור","כתב המנדט ניתן כדי ליישם את הצהרת בלפור","כתב המנדט קדם להצהרת בלפור","אין קשר ביניהם"], ans:1, ex:"הסמכה לבריטניה על ידי חבר הלאומים (ב-1922) להקמת בית לאומי לעם היהודי בארץ ישראל (יישום הצהרת בלפור)." },
        { type:"tf", q:"כתב המנדט ניתן לבריטניה על ידי עצרת האו\"ם.", ans:false, ex:"הסמכה לבריטניה על ידי חבר הלאומים (ב-1922) — לא האו\"ם אלא חבר הלאומים." },
        { type:"mc", q:"כיצד הניחה בריטניה תשתית לממלכת ירדן?", opts:["העבירה לירדן את השלטון על ארץ ישראל","הוציאה את עבר הירדן המזרחי מחוץ למנדט","חתמה על הסכם מדיני עם ירדן","מסרה לירדן את עבר הירדן המערבי"], ans:1, ex:"בריטניה הוציאה את עבר הירדן המזרחי מחוץ למנדט ובכך הניחה תשתית לממלכת ירדן." },
        { type:"tf", q:"הצהרת בלפור הייתה הכרזה רשמית על הקמת מדינת ישראל.", ans:false, ex:"מכתב ששלח שר החוץ הבריטי בלפור (ב-1917) ללורד היהודי רוטשילד — מודיע על החלטת ממשלת בריטניה לקדם הקמת בית לאומי לעם היהודי בארץ ישראל." },
        { type:"mc", q:"באיזו מלחמה פרצה בעקבות דחיית החלטה 181 על ידי הערבים?", opts:["מלחמת ששת הימים","מלחמת יום הכיפורים","השלב הראשון של מלחמת העצמאות","מלחמת לבנון הראשונה"], ans:2, ex:"ההנהגה הערבית דחתה אותה והערבים החלו בפעולות איבה/מלחמה (השלב הראשון של מלחמת העצמאות)." },
        { type:"mc", q:"מי שלח את הצהרת בלפור ולמי?", opts:["ראש ממשלת בריטניה לנשיא ארה\"ב","שר החוץ הבריטי בלפור ללורד רוטשילד","המלך הבריטי לנציג הציוני","ממשלת בריטניה לחבר הלאומים"], ans:1, ex:"מכתב ששלח שר החוץ הבריטי בלפור (ב-1917) ללורד היהודי רוטשילד." }
      ]

// ================================================================
// PROGRESS (localStorage)
// ================================================================
const STORAGE_KEY = 'azrahut_progress_v1';

function defaultProgress() {
  const p = {};
  CHAPTERS.forEach((ch, i) => {
    p[i] = {
      unlocked: i === 0,
      easy: 0, medium: 0, hard: 0
    };
  });
  return p;
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultProgress();
    const parsed = JSON.parse(raw);
    // ensure all chapters present
    const def = defaultProgress();
    CHAPTERS.forEach((_, i) => {
      if (!parsed[i]) parsed[i] = def[i];
    });
    return parsed;
  } catch(e) { return defaultProgress(); }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

// ================================================================
// HELPERS
// ================================================================
function starsForScore(pct) {
  if (pct >= 85) return 3;
  if (pct >= 65) return 2;
  return 1;
}

function renderStars(n, max=3) {
  let s = '';
  for(let i=0;i<max;i++) s += i<n ? '★' : '☆';
  return s;
}

function shuffleArray(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function totalStars() {
  let t=0;
  CHAPTERS.forEach((_,i)=>{
    t += (progress[i].easy||0)+(progress[i].medium||0)+(progress[i].hard||0);
  });
  return t;
}

function isLevelUnlocked(chapIdx, levelKey) {
  if (levelKey === 'easy') return true;
  if (levelKey === 'medium') return (progress[chapIdx].easy||0) > 0;
  if (levelKey === 'hard') return (progress[chapIdx].medium||0) > 0;
  return false;
}

  const app = document.getElementById('app');
  switch(S.screen) {
    case 'menu': app.innerHTML = renderMenu(); break;
    case 'levelSelect': app.innerHTML = renderLevelSelect(); break;
    case 'playing': app.innerHTML = renderPlaying(); break;
    case 'chapterEnd': app.innerHTML = renderChapterEnd(); break;
  }
  attachEvents();
}

    </div>
    ${chapCards}
    <div style="text-align:center;color:rgba(255,255,255,0.5);font-size:0.75rem;padding:8px 0 20px">
      ✡ התקדמות נשמרת אוטומטית ✡
    </div>`;
}

function renderLevelSelect() {
  const ch = CHAPTERS[S.chapterIdx];
  const p = progress[S.chapterIdx];

  let levelCards = '';
  LEVEL_KEYS.forEach(lk => {
    const stars = p[lk] || 0;
    const locked = !isLevelUnlocked(S.chapterIdx, lk);
    const qCount = ch.levels[lk].length;
    levelCards += `
      <div class="level-card level-${lk}${locked?' locked-level':''}"
           data-action="startLevel" data-level="${lk}" ${locked?'data-disabled="1"':''}>
        <div class="level-info">
          <div class="level-name">${LEVEL_ICONS[lk]} רמה ${LEVEL_NAMES[lk]}</div>
          <div class="level-desc">${LEVEL_DESCS[lk]}</div>
          <div class="level-stars-row">
            ${[1,2,3].map(n=>`<span class="${n<=stars?'star-filled':'star-empty'}">${n<=stars?'★':'☆'}</span>`).join('')}
          </div>
          <span class="level-count">${qCount} שאלות</span>
        </div>
        <div class="level-badge">${locked?'🔒':stars>0?'✅':'▶️'}</div>
      </div>`;
  });

  return `
    <div class="app-header">
      <button class="back-btn" data-action="goMenu">← חזרה לתפריט</button>
      <h1 style="font-size:1.3rem">${ch.icon} ${ch.title}</h1>
      <div class="subtitle">בחרי רמת קושי</div>
    </div>
    ${levelCards}`;
}

function renderPlaying() {
  const q = S.questions[S.currentQ];
  const total = S.questions.length;
  const pct = Math.round((S.currentQ / total) * 100);

  let qContent = '';
  if (q.type === 'tf') {
    let trueClass='tf-true', falseClass='tf-false';
    if(S.answered) {
      if(S.lastCorrect) {
        trueClass = q.ans===true ? 'selected-correct' : 'tf-true';
        falseClass = q.ans===false ? 'selected-correct' : 'tf-false';
        if(S.selectedOption===true && !S.lastCorrect) trueClass='selected-wrong';
        if(S.selectedOption===false && !S.lastCorrect) falseClass='selected-wrong';
      } else {
        if(S.selectedOption===true) trueClass='selected-wrong';
        if(S.selectedOption===false) falseClass='selected-wrong';
        if(q.ans===true) trueClass='reveal-correct';
        if(q.ans===false) falseClass='reveal-correct';
      }
    }
    qContent = `
      <div class="tf-row">
        <button class="tf-btn ${trueClass}" data-action="answer" data-val="true" ${S.answered?'disabled':''}>✓ נכון</button>
        <button class="tf-btn ${falseClass}" data-action="answer" data-val="false" ${S.answered?'disabled':''}>✗ לא נכון</button>
      </div>`;
  } else {
    qContent = `<div class="options-list">`;
    q.opts.forEach((opt, i) => {
      let cls = 'option-btn';
      if(S.answered) {
        if(i === q.ans) cls += ' reveal-correct';
        if(i === S.selectedOption && i !== q.ans) cls += ' selected-wrong';
        if(i === S.selectedOption && i === q.ans) cls = 'option-btn selected-correct';
      }
      qContent += `<button class="${cls}" data-action="answer" data-val="${i}" ${S.answered?'disabled':''}>${opt}</button>`;
    });
    qContent += `</div>`;
  }

  let explanationHtml = '';
  if(S.answered) {
    explanationHtml = `
      <div class="explanation-box ${S.lastCorrect?'correct-box':'wrong-box'}">
        <div class="explanation-result">${S.lastCorrect ? '✓ נכון מאוד!' : '✗ לא נכון'}</div>
        <div class="explanation-label">מהמחוון הרשמי:</div>
        <div class="explanation-quote">${q.ex}</div>
      </div>
      <button class="next-btn" data-action="nextQ">
        ${S.currentQ < S.questions.length-1 ? 'שאלה הבאה ←' : 'סיום הרמה ✓'}
      </button>`;
  }

  const retryBanner = S.isRetry ? `<div class="retry-banner">🔄 סבב שאלות שגויות</div>` : '';

  return `
    <div class="app-header">
      <button class="back-btn" data-action="goLevelSelect">← חזרה</button>
      <div style="color:white;font-size:0.85rem;opacity:0.9;margin-bottom:6px">
        ${CHAPTERS[S.chapterIdx].title} · רמה ${LEVEL_NAMES[S.levelKey]}
      </div>
      <div class="question-header">
        <span>${S.currentQ+1} מתוך ${total}</span>
        <span>${S.isRetry?'חזרה על שגויות':'סבב ראשון'}</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    ${retryBanner}
    <div class="question-card">
      <div class="question-type-badge ${q.type==='tf'?'badge-tf':'badge-mc'}">
        ${q.type==='tf'?'נכון / לא נכון':'רב-ברירה'}
      </div>
      <div class="question-text">${q.q}</div>
      ${qContent}
      ${explanationHtml}
    </div>`;
}

function renderChapterEnd() {
  const pct = S.firstTotal > 0 ? Math.round((S.firstCorrect/S.firstTotal)*100) : 0;
  const stars = starsForScore(pct);
  const ch = CHAPTERS[S.chapterIdx];
  const wrongCount = S.wrongIdxs.length;
  const retryWrongCount = S.retryWrongIdxs.length;

  // Save stars only on first round
  if(!S.isRetry) {
    const prev = progress[S.chapterIdx][S.levelKey] || 0;
    if(stars > prev) {
      progress[S.chapterIdx][S.levelKey] = stars;
    }
    // Unlock next chapter only after ALL THREE levels completed
    const p = progress[S.chapterIdx];
    const allThreeDone = p.easy > 0 && p.medium > 0 && p.hard > 0;
    if(allThreeDone && S.chapterIdx + 1 < CHAPTERS.length) {
      progress[S.chapterIdx+1].unlocked = true;
    }
    saveProgress(progress);
  }

  const starsHtml = [1,2,3].map((n,i)=>`
    <span class="${n<=stars?'star-filled':'star-empty'} star-anim" style="animation-delay:${i*0.15}s">${n<=stars?'★':'☆'}</span>
  `).join('');

  // מקרה 1: סבב ראשון עם שאלות שגויות — חובה לחזור
  if(!S.isRetry && wrongCount > 0) {
    return `
      <div class="app-header">
        <button class="back-btn" data-action="goMenu">← תפריט ראשי</button>
      </div>
      <div class="end-card">
        <div class="end-title">כמעט! 💪</div>
        <div class="end-sub">${ch.title} · רמה ${LEVEL_NAMES[S.levelKey]}</div>
        <div class="stars-display">${starsHtml}</div>
        <div class="score-text">${pct}% נכון</div>
        <div class="score-sub">${S.firstCorrect} מתוך ${S.firstTotal} נכונות בסבב ראשון</div>
        <div class="retry-info">⚠️ חובה לענות נכון על ${wrongCount} שאלות שגויות לפני שממשיכים!</div>
        <button class="end-btn btn-retry" data-action="startRetry">🔄 חזרה חובה על שאלות שגויות</button>
      </div>`;
  }

  // מקרה 2: סבב חזרה — עדיין יש שגויות — חובה לחזור שוב
  if(S.isRetry && retryWrongCount > 0) {
    return `
      <div class="app-header">
        <button class="back-btn" data-action="goMenu">← תפריט ראשי</button>
      </div>
      <div class="end-card">
        <div class="end-title">נסי שוב 🔄</div>
        <div class="end-sub">${ch.title} · רמה ${LEVEL_NAMES[S.levelKey]}</div>
        <div class="retry-info">⚠️ עדיין ${retryWrongCount} שאלות שגויות — חייבים להצליח בכולן כדי להמשיך!</div>
        <button class="end-btn btn-retry" data-action="startRetryAgain">🔄 חזרה על השגויות שוב</button>
      </div>`;
  }

  // מקרה 3: הושלם בהצלחה (אפס שגויות)
  let nextSection = '';
  if(S.chapterIdx + 1 < CHAPTERS.length) {
    if(progress[S.chapterIdx+1].unlocked) {
      nextSection = `<button class="end-btn btn-primary" data-action="nextChapter">פרק הבא: ${CHAPTERS[S.chapterIdx+1].title} →</button>`;
    } else {
      const p = progress[S.chapterIdx];
      const missing = [];
      if(!p.easy) missing.push('קל');
      if(!p.medium) missing.push('בינוני');
      if(!p.hard) missing.push('קשה');
      if(missing.length > 0) {
        nextSection = `<div class="retry-info" style="background:#E3F2FD;color:#1565C0;font-weight:700">
          🔒 כדי לפתוח את הפרק הבא — השלימי גם רמת: ${missing.join(' + ')}</div>`;
      }
    }
  }

  return `
    <div class="app-header">
      <button class="back-btn" data-action="goMenu">← תפריט ראשי</button>
    </div>
    <div class="end-card">
      <div class="end-title">${S.isRetry ? 'כל הכבוד! ✅' : 'מעולה! 🎉'}</div>
      <div class="end-sub">${ch.title} · רמה ${LEVEL_NAMES[S.levelKey]}</div>
      <div class="stars-display">${starsHtml}</div>
      <div class="score-text">${pct}% נכון</div>
      <div class="score-sub">${S.firstCorrect} מתוך ${S.firstTotal} שאלות נכונות מהסבב הראשון</div>
      ${nextSection}
      <button class="end-btn btn-secondary" data-action="goLevelSelect">בחרי רמה אחרת</button>
      <button class="end-btn btn-secondary" data-action="goMenu" style="margin-top:4px">חזרה לתפריט</button>
    </div>`;
}

// ================================================================
// EVENTS
// ================================================================
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if(action === 'openChapter') {
    const idx = parseInt(el.dataset.idx);
    if(!progress[idx].unlocked) return;
    S.chapterIdx = idx;
    S.screen = 'levelSelect';
    render();
  }
  else if(action === 'goMenu') {
    S.screen = 'menu';
    render();
  }
  else if(action === 'goLevelSelect') {
    S.screen = 'levelSelect';
    render();
  }
  else if(action === 'startLevel') {
    if(el.dataset.disabled) return;
    const lk = el.dataset.level;
    if(!isLevelUnlocked(S.chapterIdx, lk)) return;
    startLevel(lk, false);
  }
  else if(action === 'answer') {
    if(S.answered) return;
    const q = S.questions[S.currentQ];
    let chosen;
    if(q.type === 'tf') {
      chosen = el.dataset.val === 'true';
    } else {
      chosen = parseInt(el.dataset.val);
    }
    S.selectedOption = chosen;
    S.answered = true;
    S.lastCorrect = (chosen === q.ans);
    if(!S.isRetry) {
      S.firstTotal++;
      if(S.lastCorrect) S.firstCorrect++;
      else S.wrongIdxs.push(S.currentQ);
    } else {
      if(!S.lastCorrect) S.retryWrongIdxs.push(S.currentQ);
    }
    render();
  }
  else if(action === 'nextQ') {
    if(S.currentQ < S.questions.length - 1) {
      S.currentQ++;
      S.answered = false;
      S.selectedOption = null;
      render();
    } else {
      S.screen = 'chapterEnd';
      render();
    }
  }
  else if(action === 'startRetry') {
    const wrongs = S.wrongIdxs.map(i => S.questions[i]);
    startRetry(wrongs);
  }
  else if(action === 'startRetryAgain') {
    const wrongs = S.retryWrongIdxs.map(i => S.questions[i]);
    startRetry(wrongs);
  }
  else if(action === 'nextChapter') {
    S.chapterIdx = S.chapterIdx + 1;
    S.screen = 'levelSelect';
    render();
  }
}

function startLevel(levelKey, isRetry) {
  S.levelKey = levelKey;
  S.isRetry = isRetry;
  S.questions = shuffleArray([...CHAPTERS[S.chapterIdx].levels[levelKey]]);
  S.currentQ = 0;
  S.answered = false;
  S.selectedOption = null;
  S.firstCorrect = 0;
  S.firstTotal = 0;
  S.wrongIdxs = [];
  S.screen = 'playing';
  render();
}

function startRetry(wrongQs) {
  S.isRetry = true;
  S.questions = shuffleArray([...wrongQs]);
  S.currentQ = 0;
  S.answered = false;
  S.selectedOption = null;
  S.firstCorrect = 0;
  S.firstTotal = 0;
  S.wrongIdxs = [];
  S.retryWrongIdxs = [];
  S.screen = 'playing';
  render();
}

// ================================================================
// INIT
// ================================================================
render();
</script>
</body>
</html>
